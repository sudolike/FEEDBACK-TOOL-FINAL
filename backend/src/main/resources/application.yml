server:
  port: ${SERVER_PORT:9091}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 500MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:feedback_1}?serverTimezone=GMT%2b8&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

files:
  upload:
    path: ${FILES_UPLOAD_PATH:./files/}

# 通义千问 API Key（生产部署请通过环境变量 AI_API_KEY 注入）
ai-api-key: "${AI_API_KEY:sk-efffabfede29422f86ac2f9c82771a78}"
ai:
  model: ${AI_MODEL:qwen-plus}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      # 自定义只看核心组件的健康组：Docker healthcheck 用 /actuator/health/live
      group:
        live:
          include: ping,db,redis,diskSpace
          show-details: never
  health:
    # 邮箱未配置真实账号时，去掉 mail 健康指示器，避免拖垮 /actuator/health
    mail:
      enabled: false
    ldap:
      enabled: false

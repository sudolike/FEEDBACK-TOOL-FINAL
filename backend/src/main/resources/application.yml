server:
  port: ${SERVER_PORT:9091}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Tomcat 容许大体积请求/连接慢传输，支持 ~1GB 视频上传
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: -1
    connection-timeout: 600000

spring:
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
      file-size-threshold: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:feedback_1}?serverTimezone=GMT%2b8&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DB:0}
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

mybatis:
  mapper-locations: classpath:mapper/*.xml
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

files:
  upload:
    path: ${FILES_UPLOAD_PATH:./files/}

# =============================================================================
# AI Provider 配置
# -----------------------------------------------------------------------------
# 支持两种后端，由 ai.provider 控制：
#   - dashscope（默认）：阿里云通义千问 SDK，需要 AI_API_KEY
#   - pai-eas         ：阿里云 PAI EAS 自部署模型（OpenAI 兼容 / 原生 predict）
# =============================================================================
ai:
  provider: ${AI_PROVIDER:dashscope}
  model: ${AI_MODEL:qwen-plus}
  eas:
    # PAI EAS 公网调用地址，例如 http://<id>.cn-hangzhou.pai-eas.aliyuncs.com/api/predict/<service>
    # （EAS 部署 vLLM 时无需手动加 /v1/chat/completions，代码会自动追加）
    endpoint: ${AI_EAS_ENDPOINT:}
    # PAI EAS Token（控制台「调用信息」中复制，原样粘贴，无需 Bearer 前缀）
    token: ${AI_EAS_TOKEN:}
    # 部署模型名。OpenAI 兼容模式下作为 messages 的 model 字段必填项；
    # 可通过 GET <endpoint>/v1/models 查到具体名称（如 Qwen3.5-0.8B）
    model: ${AI_EAS_MODEL:Qwen3.5-0.8B}
    # openai | predict
    #   openai  ：在 endpoint 后追加 /v1/chat/completions（vLLM / TGI / 通义官方蓝图）
    #   predict ：直接 POST 到 endpoint，body 同时携带 prompt/system/history/messages
    mode: ${AI_EAS_MODE:openai}
    # Qwen3 / DeepSeek-R1 等模型的"思考模式"。
    # false（默认）→ chat_template_kwargs.enable_thinking=false，响应快很多；
    # true        → 走 reasoning，更慢但答复更"完整"。
    thinking: ${AI_EAS_THINKING:false}
    maxTokens: ${AI_EAS_MAX_TOKENS:1024}
    timeoutMs: ${AI_EAS_TIMEOUT_MS:180000}

# 通义千问 API Key（仅在 ai.provider=dashscope 时生效）
ai-api-key: "${AI_API_KEY:}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      # 自定义只看核心组件的健康组：Docker healthcheck 用 /actuator/health/live
      group:
        live:
          include: ping,db,redis,diskSpace
          show-details: never
  health:
    # 邮箱未配置真实账号时，去掉 mail 健康指示器，避免拖垮 /actuator/health
    mail:
      enabled: false
    ldap:
      enabled: false

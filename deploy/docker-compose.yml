services:

  mysql:
    image: mysql:8.0.36
    container_name: feedback-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-feedback123}
      - MYSQL_DATABASE=${DB_NAME:-feedback_1}
      - TZ=Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --innodb-ft-min-token-size=1
      - --ngram-token-size=2
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT_HOST:-3307}:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-feedback123}" ]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.2-alpine
    container_name: feedback-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_HOST:-6380}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: feedback-tool-backend:latest
    container_name: feedback-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SERVER_PORT=9091
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-feedback_1}
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-feedback123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - FILES_UPLOAD_PATH=/data/files/
      # ---- AI Provider ----
      - AI_PROVIDER=${AI_PROVIDER:-dashscope}
      - AI_MODEL=${AI_MODEL:-qwen-plus}
      - AI_API_KEY=${AI_API_KEY:-}
      # ---- PAI EAS（仅在 AI_PROVIDER=pai-eas 时使用） ----
      - AI_EAS_ENDPOINT=${AI_EAS_ENDPOINT:-}
      - AI_EAS_TOKEN=${AI_EAS_TOKEN:-}
      - AI_EAS_MODEL=${AI_EAS_MODEL:-Qwen3.5-0.8B}
      - AI_EAS_MODE=${AI_EAS_MODE:-openai}
      - AI_EAS_THINKING=${AI_EAS_THINKING:-false}
      - AI_EAS_MAX_TOKENS=${AI_EAS_MAX_TOKENS:-1024}
      - AI_EAS_TIMEOUT_MS=${AI_EAS_TIMEOUT_MS:-180000}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - TZ=Asia/Shanghai
    ports:
      - "${BACKEND_PORT_HOST:-9091}:9091"
    volumes:
      - files-data:/data/files

volumes:
  mysql-data:
  files-data:
